name: video-transcoder
icon: null
processes:
  'make: build':
    command: make build
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  make:rebuild:
    command: make down && make up
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  'make: up':
    command: make up
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  'make: down':
    command: make down
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  'make: test':
    command: make test
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
